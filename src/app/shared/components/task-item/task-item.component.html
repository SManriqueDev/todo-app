<ion-item-sliding>
  <ion-item class="task-item" [class.completed]="task().completed">
    <ion-checkbox
      slot="start"
      [checked]="task().completed"
      (ionChange)="onToggle()"
      class="task-checkbox"
    ></ion-checkbox>
    <ion-label>
      <div class="task-title" [class.completed]="task().completed">
        {{ task().title }}
      </div>
    </ion-label>
    @if (category()) {
      <ion-badge slot="end" color="light" class="category-badge">
        @if (category()?.emoji; as emoji) {
          <img class="emoji-image" [src]="emojiUrl(emoji)" [alt]="emoji" />
        }
      </ion-badge>
    }
  </ion-item>
  <ion-item-options side="end">
    <ion-item-option color="danger" (click)="onDelete()">
      <ion-icon slot="icon-only" [icon]="trash"></ion-icon>
    </ion-item-option>
  </ion-item-options>
</ion-item-sliding>
