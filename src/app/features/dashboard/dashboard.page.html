<ion-header>
  <ion-toolbar color="light" class="dashboard-toolbar">
    <div class="dashboard-header-inner">
      <div class="dashboard-title-group">
        <h1 class="header-title">Mis tareas</h1>
        <p class="header-subtitle">Organízate y gana recompensas</p>
      </div>
      <ion-button fill="clear" class="settings-button" (click)="navigateToCategories()">
        <ion-icon slot="icon-only" [icon]="settings"></ion-icon>
      </ion-button>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [scrollY]="false">
  <div class="page-container">
    <app-gamification-header></app-gamification-header>

    <app-category-filter
      [categories]="categories"
      [activeFilter]="activeFilter"
      (filterChange)="onFilterChange($event)"
    ></app-category-filter>

    <cdk-virtual-scroll-viewport
      *ngIf="filteredTasks.length > 0"
      class="task-viewport ion-content-scroll-host"
      [itemSize]="72"
      [minBufferPx]="720"
      [maxBufferPx]="1080"
    >
      <ion-list class="task-list">
        <app-task-item
          *cdkVirtualFor="let task of filteredTasks; trackBy: trackByTaskId"
          [task]="task"
          [category]="getCategoryById(task.categoryId)"
          (toggleTask)="onToggleTask($event)"
          (deleteTask)="onDeleteTask($event)"
        ></app-task-item>
      </ion-list>
    </cdk-virtual-scroll-viewport>

    @if (filteredTasks.length === 0) {
    <div class="empty-state">
      <div class="empty-icon">📝</div>
      <p class="empty-text">Aún no tienes tareas. ¡Crea una!</p>
    </div>
    }
  </div>
</ion-content>

<ion-fab slot="fixed" vertical="bottom" horizontal="end">
  <ion-fab-button (click)="openCreateTask()" color="primary">
    <ion-icon [icon]="add"></ion-icon>
  </ion-fab-button>
</ion-fab>

<app-create-task-modal #createModal></app-create-task-modal>
